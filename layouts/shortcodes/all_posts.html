<div style="margin-top: 1.5rem;">
  {{ range (where .Site.RegularPages "Type" "!=" "page").ByDate.Reverse }}
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid rgba(255,255,255,0.1);">
      
      <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
        <a href="{{ .RelPermalink }}" style="color: #3b82f6; text-decoration: none; font-weight: 500; font-size: 1.05rem;">
          {{ .Title }}
        </a>
        <span style="color: #aaa; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px;">
          {{ .Section }}
        </span>
      </div>

      <div style="color: #888; font-size: 0.85rem; white-space: nowrap; margin-left: 1rem;">
        {{ .Date.Format "Jan 02, 2006" }}
      </div>
      
    </div>
  {{ end }}
</div>
