{{ $posts := where .Site.RegularPages "Section" "posts" }}
<ul style="margin-top: 1rem; margin-bottom: 1rem; padding-left: 1.5rem;">
  {{ range first 5 $posts.ByDate.Reverse }}
    <li style="margin-bottom: 0.5rem;">
      <a href="{{ .RelPermalink }}" style="color: #3b82f6; text-decoration: none; font-weight: 500;">{{ .Title }}</a>
      <span style="color: #888; font-size: 0.9em; margin-left: 10px;">{{ .Date.Format "Jan 02, 2006" }}</span>
    </li>
  {{ end }}
</ul>

<div style="margin-bottom: 2rem; padding-left: 1.5rem;">
  <a href="/posts/" style="color: #3b82f6; text-decoration: none; font-weight: 600;">Show all posts &rarr;</a>
</div>
