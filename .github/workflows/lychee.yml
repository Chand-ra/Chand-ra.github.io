name: Check Links

on:
  push:
    branches:
      - master
  schedule:
    # Runs automatically every Sunday at midnight
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Scans Markdown, ignores LinkedIn to prevent 999 errors
          args: --exclude "linkedin.com" --verbose --no-progress './content/**/*.md'
        
      - name: Fail Build if Links are Broken
        # Looks at the ID of the previous step to check the exit code
        if: steps.lychee.outputs.exit_code != 0
        run: exit 1